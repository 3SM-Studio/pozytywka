version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Warsaw
    versioning-strategy: increase
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
          - "@types/react"
          - "@types/react-dom"
      sanity:
        patterns:
          - sanity
          - "@sanity/*"
          - styled-components
      tooling:
        dependency-type: development
        patterns:
          - turbo
          - typescript
          - eslint
          - prettier
          - tailwindcss
          - "@tailwindcss/*"
          - "@types/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 5
