name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'
  TURBO_TELEMETRY_DISABLED: '1'
  HUSKY: 0

jobs:
  security:
    name: security
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      # GitHub Actions are pinned to full commit SHA for supply-chain safety.
      # Update them through Dependabot, not by switching back to moving tags.
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level high

  quality:
    name: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      # GitHub Actions are pinned to full commit SHA for supply-chain safety.
      # Update them through Dependabot, not by switching back to moving tags.
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate pull request diff
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git diff --check "$BASE_SHA...$HEAD_SHA"

      - name: Validate pushed commit
        if: github.event_name == 'push'
        run: git show --check --format=fuller --no-renames HEAD

      - name: Validate monorepo
        env:
          # CI-only value for build validation. Production must set the real URL.
          NEXT_PUBLIC_SITE_URL: https://pozytywka.example
        run: pnpm check

      - name: Verify tracked files were not generated or modified
        run: git diff --exit-code
